name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
    inputs:
      run_docs:
        description: Build and deploy documentation
        required: false
        default: false
        type: boolean
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  instantiate:
    name: Instantiate Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: julia --project=. -e 'using Pkg; Pkg.instantiate()'
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

  default-tests:
    name: Default Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Instantiate dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: julia --project=. test/runtests.jl
        run: julia --project=. test/runtests.jl

  full-suite-tests:
    name: Full Suite Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
          arch: x64
      - uses: julia-actions/cache@v3
      - name: Instantiate dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: julia --project=. test/runtests.jl all
        run: julia --project=. --code-coverage=user test/runtests.jl all
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: full-suite
          name: suslin-full-suite
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
  docs:
    name: Documentation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_docs }}
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using Suslin
          DocMeta.setdocmeta!(Suslin, :DocTestSetup, :(using Suslin); recursive=true)
          doctest(Suslin)
